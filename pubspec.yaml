name: found_lost_app
description: "Campus Lost & Found App - Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4

  # State Management
  provider: ^6.1.2

  # Image Picker
  image_picker: ^1.1.2

  # Share
  share_plus: ^10.1.4

  # Intl for date formatting
  intl: ^0.20.2

  # Cached network images
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/haramaya_logo.png
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
